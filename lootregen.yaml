---
# Namespace - isolates this app from others on the cluster
apiVersion: v1
kind: Namespace
metadata:
  name: lootregen
---
# PersistentVolumeClaim - stores the website files
# Using K3s built-in local-path storage class
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lootregen-webpage-pvc
  namespace: lootregen
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: local-path
---
# Apache Deployment - serves the website
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache
  namespace: lootregen
  labels:
    app: apache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apache
  template:
    metadata:
      labels:
        app: apache
    spec:
      containers:
      - name: apache
        image: httpd:latest
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: webpage
          mountPath: /usr/local/apache2/htdocs/
        resources:
          requests:
            cpu: "1000m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "6Gi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: webpage
        persistentVolumeClaim:
          claimName: lootregen-webpage-pvc
---
# Apache Service - internal cluster endpoint
# cloudflared connects to this by DNS name: apache.lootregen.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: apache
  namespace: lootregen
spec:
  selector:
    app: apache
  ports:
  - port: 80
    targetPort: 80
    name: http
  type: ClusterIP
---
# Cloudflare Tunnel Deployment - exposes Apache to the internet via Cloudflare
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: lootregen
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:latest
        args:
        - tunnel
        - --no-autoupdate
        - run
        - --token
        - $(CLOUDFLARE_TOKEN)
        env:
        - name: CLOUDFLARE_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflare-token
              key: token
        resources:
          requests:
            cpu: "250m"
            memory: "200Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
