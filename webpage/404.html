<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 · Signal Lost · Lootregen</title>
<!-- ═══════════════════════════════════════════════════════
     CUSTOM 404 PAGE — "SIGNAL LOST"
     Serve this for missing routes, e.g. in nginx:
       error_page 404 /404.html;
     The small script at the bottom fills in the path the
     visitor actually requested (fake curl trace).
     ═══════════════════════════════════════════════════════ -->
<meta name="robots" content="noindex">
<link rel="stylesheet" href="fonts-inlined.css">
<style>
:root{
  --bg:#050a07;
  --yellow:#fcee0a;
  --cyan:#00f5ff;
  --red:#ff3b3b;
  --text:#c8e8d0;
  --text2:#8fb89a;
  --muted:#4a6a52;
  --mono:'Space Mono',monospace;
  --serif:'Rajdhani','Space Mono',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;
  background-image:linear-gradient(rgba(0,245,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.025) 1px,transparent 1px);
  background-size:44px 44px;overflow-x:hidden}
/* scanline sweep */
body::after{content:'';position:fixed;inset:0;pointer-events:none;
  background:linear-gradient(transparent 0%,rgba(0,245,255,0.03) 50%,transparent 100%);
  background-size:100% 8px;animation:scan 9s linear infinite;opacity:0.6}
@keyframes scan{from{background-position:0 0}to{background-position:0 100vh}}
.code{font-family:var(--serif);font-size:clamp(5rem,20vw,11rem);font-weight:700;line-height:1;
  color:transparent;-webkit-text-stroke:2px var(--yellow);position:relative;letter-spacing:0.05em}
.code::before{content:'404';position:absolute;inset:0;color:var(--red);-webkit-text-stroke:0;
  clip-path:inset(30% 0 45% 0);opacity:0;animation:glitch 3.5s steps(1) infinite}
.code::after{content:'404';position:absolute;inset:0;color:var(--cyan);-webkit-text-stroke:0;
  clip-path:inset(60% 0 20% 0);opacity:0;animation:glitch 3.5s 1.75s steps(1) infinite}
@keyframes glitch{0%{opacity:0;transform:translateX(0)}3%{opacity:0.8;transform:translateX(-5px)}6%{opacity:0;transform:translateX(0)}9%{opacity:0.6;transform:translateX(4px)}12%{opacity:0}100%{opacity:0}}
@media (prefers-reduced-motion: reduce){.code::before,.code::after,body::after{animation:none}}
.status{margin-top:1.5rem;font-size:0.65rem;letter-spacing:0.3em;color:var(--red);text-transform:uppercase}
.status .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--red);
  margin-right:8px;vertical-align:1px;animation:blink 1.2s steps(1) infinite}
@keyframes blink{50%{opacity:0.15}}
h1{margin-top:0.8rem;font-family:var(--serif);font-size:clamp(1.3rem,4vw,2rem);font-weight:600;
  color:var(--text);text-transform:uppercase;letter-spacing:0.08em}
p{margin-top:1rem;font-size:0.68rem;line-height:1.9;color:var(--text2);max-width:440px}
.term{margin-top:2rem;font-size:0.6rem;color:var(--muted);text-align:left;
  border:1px solid rgba(0,245,255,0.15);border-radius:4px;padding:1rem 1.3rem;background:rgba(0,0,0,0.35)}
.term .ok{color:var(--cyan)}
.term .err{color:var(--red)}
.cursor{display:inline-block;width:7px;height:11px;background:var(--yellow);vertical-align:-1px;animation:blink 1.1s steps(1) infinite}
.btns{margin-top:2.2rem;display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
.btn{font-family:var(--mono);font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;
  text-decoration:none;padding:12px 26px;border-radius:2px;transition:background 0.25s,color 0.25s,box-shadow 0.25s}
.btn-primary{background:var(--yellow);color:#050a07;font-weight:700}
.btn-primary:hover{box-shadow:0 0 24px rgba(252,238,10,0.35)}
.btn-ghost{color:var(--cyan);border:1px solid rgba(0,245,255,0.3)}
.btn-ghost:hover{background:rgba(0,245,255,0.08)}
.btn:focus-visible{outline:2px solid var(--cyan);outline-offset:3px}
</style>
</head>
<body>

<div class="code" aria-hidden="true">404</div>
<div class="status"><span class="dot"></span>SIGNAL LOST</div>
<h1>This sector doesn't exist</h1>
<p>The page you're looking for was moved, deleted, or never deployed to the cluster in the first place.</p>

<div class="term" aria-hidden="true">
  <div>$ curl -I lootregen.com<span id="path">/unknown</span></div>
  <div class="err">HTTP/2 404 — route not found</div>
  <div class="ok">$ suggestion: return to base<span class="cursor"></span></div>
</div>

<div class="btns">
  <a class="btn btn-primary" href="/">← Back to base</a>
  <a class="btn btn-ghost" href="/blog.html">Read the blog</a>
</div>

<script>
(function(){var el=document.getElementById('path');if(el&&location.pathname&&location.pathname!=='/'){el.textContent=location.pathname;}})();
</script>

</body>
</html>
