<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000}
  .og{position:relative;width:1200px;height:630px;background:#050a07;overflow:hidden;
      font-family:'Space Mono',monospace}
  /* grid */
  .og::before{content:'';position:absolute;inset:0;
    background-image:linear-gradient(rgba(0,245,255,0.05) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(0,245,255,0.05) 1px,transparent 1px);
    background-size:48px 48px;opacity:0.7}
  /* vignette */
  .og::after{content:'';position:absolute;inset:0;
    background:radial-gradient(120% 90% at 22% 42%,transparent 40%,rgba(0,0,0,0.6) 100%)}
  /* scanlines */
  .scan{position:absolute;inset:0;z-index:1;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0.18) 0 2px,transparent 2px 5px);opacity:0.35}
  .inner{position:absolute;inset:0;padding:56px 64px;z-index:3;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:16px;font-size:19px;letter-spacing:0.3em;color:#3fdfe6}
  .topbar .tick{color:#fcee0a}
  .title{font-family:'Rajdhani',sans-serif;font-weight:700;line-height:0.9;margin-top:34px;
    display:flex;align-items:baseline;flex-wrap:wrap}
  .loot{font-size:148px;color:#fcee0a;letter-spacing:0.01em;
    text-shadow:0 0 18px rgba(252,238,10,0.5),0 0 60px rgba(252,238,10,0.2)}
  .regen{font-size:148px;letter-spacing:0.01em;color:transparent;
    -webkit-text-stroke:3px #00f5ff;
    text-shadow:0 0 20px rgba(0,245,255,0.4)}
  .tagline{margin-top:22px;font-size:29px;letter-spacing:0.14em;color:#c8e8d0;font-weight:400}
  .tagline b{color:#00f5ff;font-weight:400}
  .chips{display:flex;gap:14px;margin-top:30px}
  .chip{font-size:21px;letter-spacing:0.1em;color:#8fb89a;padding:9px 20px;
    border:1px solid rgba(0,245,255,0.3);border-radius:3px}
  .chip.hot{color:#fcee0a;border-color:rgba(252,238,10,0.5)}
  .bottom{margin-top:auto;display:flex;align-items:center;justify-content:space-between}
  .status{display:flex;align-items:center;gap:13px;font-size:22px;letter-spacing:0.1em;color:#39ff14;
    text-shadow:0 0 8px rgba(57,255,20,0.4)}
  .dot{width:13px;height:13px;border-radius:50%;background:#39ff14;
    box-shadow:0 0 10px #39ff14,0 0 22px rgba(57,255,20,0.6);flex-shrink:0}
  .url{font-size:22px;letter-spacing:0.28em;color:#fcee0a}
  /* corner brackets */
  .corner{position:absolute;width:54px;height:54px;z-index:4;border:0 solid rgba(0,245,255,0.55)}
  .c-tl{top:24px;left:24px;border-top-width:2px;border-left-width:2px}
  .c-tr{top:24px;right:24px;border-top-width:2px;border-right-width:2px}
  .c-bl{bottom:24px;left:24px;border-bottom-width:2px;border-left-width:2px}
  .c-br{bottom:24px;right:24px;border-bottom-width:2px;border-right-width:2px}
  /* cluster diagram right */
  .sigil{position:absolute;right:36px;top:50%;transform:translateY(-50%);z-index:2;opacity:0.85}
</style>
</head>
<body>
<div class="og">
  <div class="scan"></div>
  <div class="corner c-tl"></div><div class="corner c-tr"></div>
  <div class="corner c-bl"></div><div class="corner c-br"></div>

  <!-- cluster node diagram -->
  <svg class="sigil" width="360" height="420" viewBox="0 0 240 280" fill="none">
    <!-- node hexes -->
    <g stroke="#00f5ff" stroke-width="1.4" stroke-opacity="0.7">
      <polygon points="120,18 156,39 156,81 120,102 84,81 84,39"/>
      <polygon points="52,120 88,141 88,183 52,204 16,183 16,141"/>
      <polygon points="188,120 224,141 224,183 188,204 152,183 152,141"/>
    </g>
    <!-- inner hexes -->
    <g stroke="#fcee0a" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="4 4">
      <polygon points="120,34 142,47 142,73 120,86 98,73 98,47"/>
      <polygon points="52,136 74,149 74,175 52,188 30,175 30,149"/>
      <polygon points="188,136 210,149 210,175 188,188 166,175 166,149"/>
    </g>
    <!-- links -->
    <g stroke="#fcee0a" stroke-width="1.4" stroke-opacity="0.6">
      <line x1="104" y1="94" x2="68" y2="128"/>
      <line x1="136" y1="94" x2="172" y2="128"/>
    </g>
    <line x1="92" y1="162" x2="148" y2="162" stroke="#00f5ff" stroke-width="1.4" stroke-opacity="0.6" stroke-dasharray="6 5"/>
    <!-- node cores -->
    <circle cx="120" cy="60" r="5" fill="#fcee0a"/>
    <circle cx="52" cy="162" r="5" fill="#00f5ff"/>
    <circle cx="188" cy="162" r="5" fill="#00f5ff"/>
    <!-- labels -->
    <g font-family="'Space Mono',monospace" font-size="9" fill="#8fb89a" text-anchor="middle" letter-spacing="1">
      <text x="120" y="118">QDEVICE</text>
      <text x="52" y="222">PVE-01</text>
      <text x="188" y="222">PVE-02</text>
      <text x="120" y="154" fill="#00f5ff" font-size="8">40G TB4</text>
    </g>
    <!-- uplink pulse ring -->
    <circle cx="120" cy="60" r="14" stroke="#fcee0a" stroke-width="0.8" stroke-opacity="0.4"/>
    <circle cx="120" cy="255" r="0"/>
  </svg>

  <div class="inner">
    <div class="topbar"><span class="tick">▸</span>PLATFORM ENGINEER · SWITZERLAND</div>
    <div class="title">
      <span class="loot">LOOT</span><span class="regen">REGEN</span>
    </div>
    <div class="tagline">Homelab · Certs · <b>Self-hosted on my own cluster</b></div>
    <div class="chips">
      <span class="chip hot">PROXMOX</span>
      <span class="chip">KUBERNETES</span>
      <span class="chip">DOCKER</span>
      <span class="chip">AZURE</span>
      <span class="chip">LINUX</span>
    </div>
    <div class="bottom">
      <div class="status"><span class="dot"></span>ACTIVE: LFCS · DCA · AZ-104 — 2026</div>
      <div class="url">LOOTREGEN.COM</div>
    </div>
  </div>
</div>
</body>
</html>
